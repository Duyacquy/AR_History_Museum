<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Bảo Tàng Số - Gamification</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>

    <script>
      AFRAME.registerComponent('chromakey', {
        schema: { color: {type: 'color', default: '#00FF00'} },
        init: function () {
          this.el.addEventListener('materialtextureloaded', () => {
            const mesh = this.el.getObject3D('mesh');
            if (!mesh) return;
            const material = mesh.material;
            // Ghi đè shader mặc định để lọc màu xanh
            material.onBeforeCompile = (shader) => {
              shader.uniforms.keyColor = { value: new THREE.Color(this.data.color) };
              shader.vertexShader = shader.vertexShader;
              shader.fragmentShader = `
                uniform vec3 keyColor;
              ` + shader.fragmentShader.replace(
                `vec4 diffuseColor = vec4( diffuse, opacity );`,
                `
                vec4 diffuseColor = vec4( diffuse, opacity );
                float dist = distance(texture2D(map, vUv).rgb, keyColor);
                if (dist < 0.45) { discard; } // Ngưỡng xóa màu xanh (0.45)
                `
              );
            };
          });
        }
      });
    </script>

    <style>
      #ui-container {
        position: absolute; grid-area: main; z-index: 1000;
        top: 10px; left: 10px; right: 10px;
        font-family: Arial, sans-serif; pointer-events: none;
      }
      .badge {
        background: rgba(0, 0, 0, 0.7); color: white; padding: 10px;
        border-radius: 8px; font-size: 16px; display: inline-block;
      }
    </style>
  </head>

  <body>
    <div id="ui-container">
      <div class="badge">Nhiệm vụ: <span id="score">0</span>/10 Bản đồ</div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="video-tran1" src="./video-tranchien.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
      </assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target1" mindar-image-target="targetIndex: 0">
        <a-video src="#video-tran1" chromakey="color: #00FF00" width="1" height="0.56" position="0 0 0" rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const target1El = document.querySelector('#target1');
      const video1 = document.querySelector('#video-tran1');
      const scoreEl = document.querySelector('#score');
      
      let hasScored = false; // Biến đánh dấu xem bản đồ này đã cộng điểm chưa

      // Sự kiện: Khi camera nhận diện được bản đồ
      target1El.addEventListener("targetFound", event => {
        console.log("Đã tìm thấy bản đồ 1!");
        video1.play(); // Tự động phát video (và âm thanh đi kèm)
        
        if (!hasScored) {
          hasScored = true;
          // Tăng điểm trên UI (ở đây lấy ví dụ tăng lên 1, bạn có thể dùng localStorage để lưu)
          scoreEl.innerText = "1"; 
          alert("Chúc mừng! Bạn đã mở khóa nhiệm vụ Bản đồ trận chiến 1!");
        }
      });

      // Sự kiện: Khi người dùng đưa camera ra chỗ khác (mất dấu bản đồ)
      target1El.addEventListener("targetLost", event => {
        console.log("Mất dấu bản đồ!");
        video1.pause(); // Tạm dừng video để tiết kiệm hiệu năng
      });
    </script>
  </body>
</html>
